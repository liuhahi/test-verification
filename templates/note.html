{% extends "base.html" %}
{% block title %}Note #{{ note['id'] }}{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header d-flex justify-content-between">
    <span>{{ note['title'] }}</span>
    <small class="text-muted">Note ID: {{ note['id'] }} · Owner user_id: {{ note['user_id'] }}</small>
  </div>
  <div class="card-body">
    <p class="card-text">{{ note['content'] }}</p>
  </div>
</div>
<a href="{{ url_for('dashboard') }}" class="btn btn-secondary mt-3">Back</a>
{% endblock %}
