<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VulnApp – {% block title %}Home{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
{% if session.user_id %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">🔒 VulnApp</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="{{ url_for('search') }}">Search</a>
      {% if session.role == 'admin' %}
      <a class="nav-link text-warning" href="{{ url_for('admin') }}">Admin</a>
      {% endif %}
      <a class="nav-link" href="{{ url_for('ping') }}">Ping</a>
      <span class="nav-link text-secondary">{{ session.username }}</span>
      <a class="nav-link text-danger" href="{{ url_for('logout') }}">Logout</a>
    </div>
  </div>
</nav>
{% endif %}
<div class="container mt-4">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
